### Events ###
 april.1.t: "§RRussian Roulette§!"
 april.1.d: "We at the Kaiserreich team always seek to answer the demands and wishes of our community. To address the fact that people feel this mod is too railroaded, we have decided to add a mechanic which brings nearly infinite replayability and randomness to any playthrough.\n\n§RAt the start of every year, one random AI country will declare war on one random AI country. This war declaration has no content restrictions. Anything is fair game.§!\n\nSecond Weltkrieg in 1936? Russian invasion of China? Germany invades the US during the civil war? Your ally declares war on a superpower and pulls in you and your 3 infantry divisions to a death war? Anything can happen... all you need to do is pull the trigger."
 april.1.a: "Pull the trigger..."
 april.1.b: "I am too afraid to pull it..."
 april.1.c: "I'm a dumb robot and can't even shoot a gun."
 will_crash_game: "§RThis will crash the game, coward.§!"
 one_random_war_every_year: "Bang."

 april_card_game.1.t: "§RThe Card Game of Life§!"
 april_card_game.1.d: "Everything in life is determined by gambling, by chance. The weather. The outcome of wars. The economy. Your past. Present. Future. And your playthrough of Kaiserreich will be, too.\n\nA hand of cards is raised before you. The card you draw will determine your fate."
 april_card_game.1.a: "Draw a card..."

 april_card_game.10.t: "XVII. The Star"
 april_card_game.10.d: "XVII. THE STAR. Loss, theft, privation, abandonment."
 april_card_game.10.a: "What does this mean?"

 april_card_game.2.t: "VIII. Justice"
 april_card_game.2.d: "VIII. JUSTICE. Equity, rightness, probity, executive. Reversed: Law in all its departments, legal complications, bigotry, bias, excessive severity."
 april_card_game.2.a: "What does this mean?"

 april_card_game.7.t: "XIII. Death"
 april_card_game.7.d: "XIII. DEATH. End, mortality, destruction, corruption; also, for a man, the loss of a benefactor; for a woman, many contrarieties; for a maid, failure of marriage projects."
 april_card_game.7.a: "What does this mean?"

 april_card_game.12.t: "XVI. The Tower"
 april_card_game.12.d: "XVI. THE TOWER. Misery, distress, indigence, adversity, calamity, disgrace, deception, ruin. It is a card in particular of unforeseen catastrophe."
 april_card_game.12.a: "What does this mean?"

 april_card_game.3.t: "XV. The Devil"
 april_card_game.3.d: "XVI. THE DEVIL. Ravage, violence, vehemence, extraordinary efforts, force, fatality; that which is predestined but is not for this reason evil."
 april_card_game.3.a: "What does this mean?"

 april_card_game.4.t: "IX. The Hermit"
 april_card_game.4.d: "IX. THE HERMIT. Prudence, circumspection; also and especially treason, dissimulation, roguery, corruption. Reversed: Concealment, disguise, policy, fear, unreasoned caution."
 april_card_game.4.a: "What does this mean?"

 april_card_game.5.t: "II. The High Priestess"
 april_card_game.5.d: "II. THE HIGH PRIESTESS. Secrets, mystery, the future as yet unrevealed; the woman who interests the Querent, if male; the Querent herself, if female; silence, tenacity; mystery, wisdom, science."
 april_card_game.5.a: "What does this mean?"

 april_card_game.6.t: "IV. The Emperor"
 april_card_game.6.d: "IV. THE EMPEROR. Leadership, responsibility, and structure. Rule over the land and its peoples."
 april_card_game.6.a: "What does this mean?"

 april_card_game.8.t: "VII. The Chariot"
 april_card_game.8.d: "VII. THE CHARIOT. Succour, providence; also war, triumph, presumption, vengeance, trouble. Reversed: Riot, quarrel, dispute, litigation, defeat."
 april_card_game.8.a: "What does this mean?"

 april_card_game.9.t: "XVIII. The Moon"
 april_card_game.9.d: "XVIII. THE MOON. Hidden enemies, danger, calumny, darkness, terror, deception, occult forces, error."
 april_card_game.9.a: "What does this mean?"

 april_card_game.11.t: "X. Wheel of Fortune"
 april_card_game.11.d: "X. WHEEL OF FORTUNE. Destiny, fortune, success, elevation, luck, felicity. Return home after a long journey."
 april_card_game.11.a: "What does this mean?"

 april_card_game.13.t: "0. The Fool"
 april_card_game.13.d: "0. THE FOOL. Folly, mania, extravagance, intoxication, delirium, frenzy, bewrayment."
 april_card_game.13.a: "What does this mean?"

 april_card_game.14.t: "XXI. The World"
 april_card_game.14.d: "XXI. THE WORLD. Assured success, recompense, voyage, route, emigration, flight, change of place."
 april_card_game.14.a: "What does this mean?"

 april_card_game.15.t: "VI. The Lovers"
 april_card_game.15.d: "VI. THE LOVERS. Attraction, love, beauty, trials overcome, Failure, foolish designs."
 april_card_game.15.a: "What does this mean?"
 april_card_game_the_lovers: "§RMy [?global.zazu_country.GetName] Left me§!"

 marked_for_death: "Marked for Death"
 marked_for_death_desc: "This person has been marked for death. Have you been locked into your current path yet?"
 april_card_game.2.tt: "All of your units will §Rlose 50% of their strength.§!"
 april_card_game.3.tt: "One random AI country will now §Rdeclare war on you.§!"
 april_card_game.5.tt: "All Infantry Weapons technologies will be §Rforgotten.§!"
 april_card_game.6.tt: "All of your Light Hull ships (destroyers) will be §Rdeleted.§!"
 april_card_game.8.tt: "A random army commander will §Rretire.§!"
 april_card_game.10.tt: "A random owned state will §Rbecome a wasteland.§! It will lose all its factories and be demilitarized."
 april_card_game.11.tt: "All of your divisions will be §Rteleported to the capital.§!"
 april_card_game.12.tt: "Half of your divisions and ships will be §Rsent to Brazil.§!"
 april_card_game.13.tt: "§ROhhh, you're fucked now...§!"
 april_card_game_forgot: "We forgor"
 april_card_14_idea: "Attuned with the World"

### Rise of Peru Bolivia ###
 rise_of_peru_bolivia.1.t: "The Rise of the Peru-Bolivia Confederation"
 rise_of_peru_bolivia.1.d: "Peru-Bolivia has always been and remains a great country. We must demonstrate this to the entire world. To achieve this, we must initiate a series of victorious military campaigns. And our target this time will be..."
 rise_of_peru_bolivia.1.a: "In the name of the Peru-Bolivian Confederation, we declare war!"

### T. E. Lawrence ###
 lawrence_coup.1.t: "T.E. Lawrence Offers His Services"
 lawrence_coup.1.d: "Veteran agitator and aid to the Arab Revolt in the Weltkrieg T.E. Lawrence has kept a low profile in the Union so far. However, three years ago he narrowly avoided death in a motorcycle accident that ended years of aimless wandering through life. Today he approached Army High Command and offered to train as an agitator to help European Syndicalists rise up during the eventual war with Germany."
 lawrence_coup.1.a: "Lawrence shall be valuable in spreading the revolution."
 lawrence_coup.1.b: "We don't trust him - where are his Socialist credentials?"

 lawrence_coup.2.t: "Send Lawrence to Germany?"
 lawrence_coup.2.d: "T.E. Lawrence has asked permission to be air-dropped behind German lines and rendezvous with Syndicalist leaders in the Rhine and Saarland regions of Germany to raise raiding parties and potentially a revolt."
 lawrence_coup.2.a: "Good luck, Lawrence of Germania!"
 lawrence_coup.2.b: "We cannot spare the funds."

 lawrence_coup.3.t: "The Return of T.E. Lawrence!"
 lawrence_coup.3.d: "Our commanders in the Saarland and Rhineland regions indicate that the former scourge of the Ottomans, T.E. Lawrence, along with other agitators and agents, is travelling through the countryside and working with local underground Syndicalist movements to sabotage elements of German industry! They must be stopped at once!"
 lawrence_coup.3.a: "Damn you, Lawrence of Germania!"

 lawrence_coup.4.t: "T.E. Lawrence Has Moved North!"
 lawrence_coup.4.d: "That damned T.E. Lawrence is continuing to cause trouble, growing bolder as he moves his band of reds (who are blending in with the civilian population irritatingly well) into our northern Rhineland cities. He cannot be allowed to carry on!"
 lawrence_coup.4.a: "Damn you, Lawrence of Germania!"

 lawrence_coup.5.t: "T.E. Lawrence Has Moved East!"
 lawrence_coup.5.d: "That damned T.E. Lawrence is continuing to cause trouble, growing bolder as he moves his band of reds (who are blending in with the civilian population irritatingly well) into our central industrial cities. The chief of the Reich's security services has promised the Kaiser this will be the last time he and his 'merry men' can wreak havoc in this way. They have set a trap for him in Dresden."
 lawrence_coup.5.a: "Damn you, Lawrence of Germania!"

 lawrence_coup.6.t: "T.E. Lawrence Survives Ambush!"
 lawrence_coup.6.d: "German security forces snapped their trap on Comrade Lawrence while he and German Syndicalist fighters, one of them the writer Bertolt Brecht, were planting bombs in a factory in Dresden. While Lawrence managed to escape to the coast where a French submarine was able to take him back to Britain he was shot in the leg and can no longer walk without a cane. His time as an agitator is over, but his time as a Syndicalist hero has only just begun."
 lawrence_coup.6.a: "Hoorah for Lawrence of Germania!"
 lawrence_coup.6.b: "Good enough."

 lawrence_coup.7.t: "T.E. Lawrence Killed!"
 lawrence_coup.7.d: "German security forces snapped their trap on Comrade Lawrence while he and local Syndicalist fighters were planting bombs in a factory in Dresden. While Lawrence managed to secure the escape of his fellow revolters he was shot square in the chest and died on the spot. His time as an agitator is over, but his time as a Syndicalist hero has only just begun."
 lawrence_coup.7.a: "To absent friends! Hoorah for Lawrence of Germania!"
 lawrence_coup.7.b: "Good."

 lawrence_coup.8.t: "The Junta's Next Move"
 lawrence_coup.8.d: "Interim Chairman Lawrence has never been comfortable ruling a socialist nation such as ours. A good man and loyal Briton at heart, he was more at home agitating foreign peoples than overseeing five-year plans. Comrade Horner approached him and asked if he will allow a Congress to meet as soon as possible and establish a new civilian government - or maybe he has other ideas..."
 lawrence_coup.8.a: "Civilians? Pah! Though this socialism thing is growing on me..."
 lawrence_coup.8.b: "The Federationists secure the majority."


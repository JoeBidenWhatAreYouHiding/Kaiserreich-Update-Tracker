 PAL_karl_von_habsburg_regnal: "Carolus I"
 PAL_karl_von_habsburg_leader_desc: "§YReal idea btw. See:§Y §CFriedman, I. (1977) Germany, Turkey, and Zionism 1897-1918, Oxford University Press, pp. 390-391.§!\n§YBorn:§! §LAugust 17th, 1887, in Persenbeug Castle, Persenbeug-Gottsdorf, Archduchy of Austria below the Enns, Austria-Hungary§!\n§YBackground:§! §LAfter his uncle Franz Ferdinand was assassinated in 1914, Karl von Habsburg-Lothringen became the designated successor of Kaiser Franz Josef, upon whose death Karl inherited the many thrones of the Habsburg Empire in late 1916. In 1918, Germany proposed the creation of the Kingdom of Jerusalem under the leadership of a German Catholic prince, and there was no better candidate than Karl. Since then, he has never found the time to visit his new kingdom, leaving the reign in the hands of the international council, but he is very fond of his title.§!"


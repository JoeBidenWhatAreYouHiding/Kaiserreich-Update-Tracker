 ENG_thomas_edward_lawrence: "Thomas Edward Lawrence"
 ENG_thomas_edward_lawrence_leader_desc: "§YBorn:§! §LAugust 16th, 1888, in Tremadoc, Caernarfonshire, Wales§!\n§YBackground:§! §LThomas Edward Lawrence, the famous officer and archaeologist who unsuccessfully led the Arab tribes in rebellion against the Ottoman Empire during the Weltkrieg, has led a coup against the government of the Union of Britain. Lawrence, charismatic yet reserved, has made ambiguous promises to the British people regarding Britain's future. While his past dedication to the Syndicalist cause is undeniable, many speculate that he harbours monarchist sympathies.§!"


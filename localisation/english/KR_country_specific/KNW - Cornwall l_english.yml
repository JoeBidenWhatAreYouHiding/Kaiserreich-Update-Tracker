 KNW_radical_socialist_party_long: "Labour - Parliamentarians\n§LThe Labour Party was never a powerful force in Cornwall. The lack of penetration of trade unions, ailing local industry, and the resilience of old-school Liberal voting blocs around the Methodist Church, all combined to prevent a Labour breakthrough past the Tamar. However, the shuttering of the Liberals and the NDP after the Parliamentary Crisis meant that Labour was able to scrape together a thread-bare majority of seats in the 1933 Local Elections. Under Southwest Chairman Harold Hayman, Cornish Labour skews towards the Parliamentarian moderates of the party, though Syndicalism is a growing tendancy among the younger members of the party. Labour also has a close relationship with the political/pressure group Tyr ha Tavas (Land and Language), which advocates for the revival of the Cornish language.§!\n"

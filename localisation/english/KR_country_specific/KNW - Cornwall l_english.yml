 KNW_market_liberal_party: "Cornish Party"
 KNW_market_liberal_party_long: "Cornish Party\n§LFollowing the Parliamentary Crisis, many regional branches of the Liberal Party filed off from the proscribed outfit to form their own local parties to contest elections going forwards. In Cornwall, that led to the creation of the Cornish Party which performed strongly in the 1933 Local Elections. Erroneously thought of on the national stage to be a cornish nationalist outfit, the Cornish Party is in fact moreso a classical liberal party representing farmers, fishermen, and others against socialist overreach and revolutionary encroachment. A strong Cornish Revivalist faction does exist around prominent party member and Home Guard officer Cecil Beer, who sits in a prime position to seize the party apparatus if the Liberals' proscription is lifted in the future.§!\n"

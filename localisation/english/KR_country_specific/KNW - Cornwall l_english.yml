 KNW_national_populist_party2: "Mebyon Kernow"
 KNW_national_populist_party_long2: "Mebyon Kernow (Sons of Cornwall)\n§LBefore the Irish occupation, Cornish revivalist thought was a throughline for the political left-of-centre, with the Liberals and Labour most keenly attached to the idea through their local political machines. This was not an acceptable state of affairs for the new occupiers however, whose anti-socialist and anti-liberal thought was a core part of their pan-Celticism. To this end a scant few collaborators, largely opportunistic turncoats from the Labour-aligned Tyr ha Tavas group, accepted orders from the Irish to form a new party to justify the local regime. Mebyon Kernow, or Sons of Cornwall, officially adheres to a clerical nationalism not dissimilar to the Irish situation, however it should be noted that the \"party\" exists only as far as Irish soldiers are willing to travel.§!\n"

### Ideas ###

 KNW_why_do_you_exist: "A Nation That Shouldn’t Exist"
 KNW_why_do_you_exist_desc: "While Cornish regionalist sentiment has always been a thing that local political machines have tapped into, owing to the peninsula’s geographical isolation, the nationalist movement is a nascent, fringe element in local society. With a cultural revival only starting on the edges of society in the last twenty years, it is no surprise that few people feel any attachment to an independent government in Cornwall. While there may not be riotous hatred towards the administration in Truro, there is a widespread sense of apathy, and few are willing to seriously buy into a wholly artificial government that likely won’t stand the test of time."
 KNW_home_of_the_industrial_revolution: "The Home of the Industrial Revolution"
 KNW_home_of_the_industrial_revolution_desc: "At one point in time Cornwall was the most industrialised place on earth. It was a brief period a century ago, but it still counts. With an economy built on the extraction of Tin, Copper, and later China Clay, a medley of settlements, railways and mines sprung up across the county, and her population exploded. It was a Cornishman who invented the steam locomotive, and it was Cornish expertise and knowhow that informed mining techniques across Britain and then the globe. Today, the area bears the scars of its industrial past: a range of growing clay pits and refuse tips affectionately called the “Cornish Alps” straddle the spine of the peninsula, and engine houses are littered all along the Atlantic coast."
 KNW_persistent_deindustrialisation: "Persistent Deindustrialisation"
 KNW_persistent_deindustrialisation_desc: "Cornwall is well past its glory days. There are many reasons why Cornwall’s economy has entered into a gradual but persistent decline since the turn of the century: an unstable, chaotic system of mine ownership and management that placed short term profit over long term sustainability, unprecedented brain drain as experts packed their bags (and closed their mines) to migrate to greener pastures as far as Mexico and Australia, the geographical isolation of the peripheral region making the transportation of raw goods time consuming and infrastructural development prohibitively expensive, and the brute fact that Cornwall lacks any domestic coal deposits. The local population peaked in the 1870s, and has been declining since. With mines drying up and closing, little has sprung up to replace the lost employment, and attempts by the Union’s Five Year Plans to foster local industry have done little. Unless something radical can be done to reverse the decline, it would appear that Cornwall’s long term fate is sealed, an increasingly poor region plagued by unemployment and outward migration, where the young and bright move to somewhere better."

